<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FashionSense — Live Detection</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  /* ── Reset & Variables ─────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0a0b0f;
    --surface:     #13141a;
    --surface2:    #1c1d26;
    --border:      #2a2b38;
    --accent:      #e8ff47;
    --accent2:     #ff6b6b;
    --accent3:     #6bffb8;
    --text:        #f0f0f5;
    --text-muted:  #6b6c7e;
    --tag-bg:      #1e2030;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body:    'DM Sans', sans-serif;
    --font-mono:    'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── Header ─────────────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 36px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 2rem;
    letter-spacing: 0.08em;
    color: var(--accent);
  }
  .logo span { color: var(--text-muted); font-size: 1rem; letter-spacing: 0.2em; margin-left: 12px; font-family: var(--font-body); font-weight: 300; }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .status-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 0.78rem;
    font-family: var(--font-mono);
    color: var(--text-muted);
  }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #444;
    transition: background 0.3s;
  }
  .status-dot.active  { background: var(--accent3); box-shadow: 0 0 8px var(--accent3); animation: pulse 2s infinite; }
  .status-dot.error   { background: var(--accent2); }

  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  .fps-counter {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    color: var(--accent);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 16px;
  }

  /* ── Main Layout ─────────────────────────────────────────────────── */
  main {
    display: grid;
    grid-template-columns: 1fr 380px;
    grid-template-rows: auto 1fr;
    gap: 0;
    flex: 1;
    min-height: 0;
  }

  /* ── Camera Feed ─────────────────────────────────────────────────── */
  .camera-section {
    grid-column: 1;
    grid-row: 1 / 3;
    position: relative;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 1px solid var(--border);
    min-height: 520px;
  }

  #camera-feed {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .camera-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: rgba(10,11,15,0.85);
    transition: opacity 0.4s;
  }
  .camera-overlay.hidden { opacity: 0; pointer-events: none; }

  .camera-placeholder-icon {
    font-size: 4rem;
    opacity: 0.2;
  }

  .camera-placeholder-text {
    font-family: var(--font-display);
    font-size: 1.5rem;
    letter-spacing: 0.15em;
    color: var(--text-muted);
  }

  .camera-placeholder-sub {
    font-size: 0.82rem;
    color: var(--text-muted);
    opacity: 0.6;
  }

  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 3s linear infinite;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .scan-line.active { opacity: 0.6; }

  @keyframes scan {
    0%   { top: 0; }
    100% { top: 100%; }
  }

  /* Corner brackets */
  .bracket { position: absolute; width: 40px; height: 40px; opacity: 0.4; }
  .bracket.tl { top: 20px; left: 20px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
  .bracket.tr { top: 20px; right: 20px; border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); }
  .bracket.bl { bottom: 20px; left: 20px; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); }
  .bracket.br { bottom: 20px; right: 20px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }

  /* ── Right Panel ─────────────────────────────────────────────────── */
  .panel {
    grid-column: 2;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-section {
    padding: 24px;
    border-bottom: 1px solid var(--border);
  }

  .panel-title {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* ── Controls ───────────────────────────────────────────────────── */
  .controls { display: flex; gap: 10px; }

  .btn {
    flex: 1;
    padding: 10px 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .btn:hover { background: var(--border); }
  .btn.primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn.primary:hover { filter: brightness(0.9); }
  .btn.danger {
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .btn.danger:hover { background: rgba(255,107,107,0.1); }

  .conf-control {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.82rem;
    color: var(--text-muted);
  }
  .conf-control input[type=range] {
    flex: 1;
    accent-color: var(--accent);
  }
  .conf-value {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    color: var(--accent);
    min-width: 36px;
    text-align: right;
  }

  /* ── Detections list ─────────────────────────────────────────────── */
  .detections-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 48px;
  }

  .detection-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 0.78rem;
    font-weight: 500;
    animation: tagIn 0.25s ease;
  }
  @keyframes tagIn { from { opacity:0; transform: scale(0.85); } to { opacity:1; transform: scale(1); } }

  .detection-dot {
    width: 7px; height: 7px; border-radius: 50%;
    flex-shrink: 0;
  }

  .detection-conf {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--text-muted);
  }

  .no-detection {
    color: var(--text-muted);
    font-size: 0.82rem;
    font-style: italic;
    align-self: center;
  }

  /* ── Recommendations ─────────────────────────────────────────────── */
  .recs-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 24px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .recs-list::-webkit-scrollbar { width: 4px; }
  .recs-list::-webkit-scrollbar-track { background: transparent; }
  .recs-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .rec-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    animation: cardIn 0.3s ease;
  }
  @keyframes cardIn { from { opacity:0; transform: translateX(12px); } to { opacity:1; transform: none; } }
  .rec-card:hover { border-color: var(--accent); background: rgba(232,255,71,0.04); }

  .rec-thumb {
    width: 48px; height: 60px;
    border-radius: 6px;
    background: var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    overflow: hidden;
  }
  .rec-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .rec-info { flex: 1; min-width: 0; }

  .rec-name {
    font-weight: 600;
    font-size: 0.88rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .rec-cat {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-family: var(--font-mono);
  }

  .rec-reason {
    font-size: 0.73rem;
    color: var(--accent3);
    opacity: 0.8;
    margin-bottom: 6px;
  }

  .rec-price {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--accent);
    font-weight: 500;
  }

  .empty-recs {
    color: var(--text-muted);
    font-size: 0.82rem;
    font-style: italic;
    text-align: center;
    padding: 24px 0;
  }

  /* ── Upload mode ─────────────────────────────────────────────────── */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    font-size: 0.85rem;
    color: var(--text-muted);
    display: none;
  }
  .drop-zone.active { display: block; }
  .drop-zone:hover { border-color: var(--accent); }

  /* ── Misc ─────────────────────────────────────────────────────────── */
  .inference-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 6px;
  }
  .inference-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.5s ease;
    width: 0%;
  }

  .mode-tabs {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .mode-tab {
    flex: 1;
    padding: 8px;
    background: var(--surface2);
    color: var(--text-muted);
    border: none;
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 0.8rem;
    font-weight: 500;
    transition: all 0.2s;
  }
  .mode-tab.active { background: var(--accent); color: #000; }

  #upload-input { display: none; }
</style>
</head>
<body>

<header>
  <div>
    <span class="logo">FashionSense <span>LIVE DETECTION</span></span>
  </div>
  <div class="status-bar">
    <div class="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Disconnected</span>
    </div>
    <div class="fps-counter" id="fps-counter">— FPS</div>
  </div>
</header>

<main>
  <!-- Camera / Feed Section -->
  <section class="camera-section">
    <div class="bracket tl"></div>
    <div class="bracket tr"></div>
    <div class="bracket bl"></div>
    <div class="bracket br"></div>
    <div class="scan-line" id="scan-line"></div>

    <img id="camera-feed" alt="Camera feed" style="display:none;"/>

    <div class="camera-overlay" id="camera-overlay">
      <div class="camera-placeholder-icon">📷</div>
      <div class="camera-placeholder-text">CAMERA READY</div>
      <div class="camera-placeholder-sub">Click "Start Camera" to begin live detection</div>
    </div>
  </section>

  <!-- Right Panel -->
  <aside class="panel">

    <!-- Mode Tabs -->
    <div class="panel-section">
      <div class="mode-tabs">
        <button class="mode-tab active" id="tab-live" onclick="setMode('live')">Live Camera</button>
        <button class="mode-tab" id="tab-upload" onclick="setMode('upload')">Upload Image</button>
      </div>

      <!-- Live controls -->
      <div id="live-controls">
        <div class="controls">
          <button class="btn primary" id="btn-start" onclick="startCamera()">▶ Start Camera</button>
          <button class="btn danger" id="btn-stop" onclick="stopCamera()" disabled>■ Stop</button>
        </div>
        <div class="conf-control">
          <span>Confidence</span>
          <input type="range" min="10" max="90" value="40" id="conf-slider" oninput="updateConf(this.value)"/>
          <span class="conf-value" id="conf-label">40%</span>
        </div>
        <div class="inference-bar"><div class="inference-fill" id="inf-bar"></div></div>
      </div>

      <!-- Upload controls -->
      <div id="upload-controls" style="display:none">
        <div class="drop-zone active" id="drop-zone" onclick="document.getElementById('upload-input').click()">
          🖼️ &nbsp; Click or drag an image here
        </div>
        <input type="file" id="upload-input" accept="image/*" onchange="handleUpload(event)"/>
      </div>
    </div>

    <!-- Detected Items -->
    <div class="panel-section">
      <div class="panel-title">Detected Clothing</div>
      <div class="detections-list" id="detections-list">
        <span class="no-detection">Nothing detected yet</span>
      </div>
    </div>

    <!-- Recommendations -->
    <div class="panel-section" style="padding-bottom:12px;">
      <div class="panel-title">Store Recommendations</div>
    </div>
    <div class="recs-list" id="recs-list">
      <div class="empty-recs">Recommendations will appear once clothing is detected</div>
    </div>

  </aside>
</main>

<script src="static/js/app.js"></script>
</body>
</html>
